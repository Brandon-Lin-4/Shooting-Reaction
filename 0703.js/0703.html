<!DOCTYPE html>
<html lang = "zh-TW">
<head>
<meta charset = "UTF-8">
<meta name = "viewport" content = "width = device-width,initial-scale = 1.0">
<title>射擊遊戲</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#222;
  cursor:none;
  user-select:none;
  font-family:Arial;
}

#score{
  position:fixed;
  top:15px;
  left:20px;
  color:white;
  font-size:32px;
  font-weight:bold;
}

#timer{
  position:fixed;
  top:15px;
  right:20px;
  color:yellow;
  font-size:32px;
  font-weight:bold;
}
.target{
  position:absolute;
  border-radius:50%;
  cursor:pointer;
  transition:left .6s linear, top .6s linear;
}
.explode{
  animation:boom .3s forwards;
}
#crosshair{
  width:20px;
  height:20px;
  border:3px solid white;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:9999;
}
@keyframes boom{

0%{
transform:scale(1);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}
}

</style>
</head>
<body>
<div id = "score">分數:0</div>
<div id = "timer">60</div>
<div id = "crosshair"></div>

<script>
let score = 0;
let time = 60;

const TARGET_COUNT = 12;
function random(min,max){
  return Math.random()*(max-min)+min;
}
function randomColor(){
  const colors = [
  "red"
  ];
  return colors[Math.floor(Math.random()*colors.length)];
}
function createTarget(){
  const target = document.createElement("div");
  target.className = "target";

  const size = 60;
  target.style.width = size + "px";
  target.style.height = size + "px";
  target.style.background = randomColor();
  target.style.left = random(0,window.innerWidth-size)+"px";
  target.style.top = random(60,window.innerHeight-size)+"px";
  document.body.appendChild(target);
//點 消失
target.addEventListener("click",function(){
  if (target.dataset.hit=="1") return;
  target.dataset.hit="1";
  score++;
  document.getElementById("score").innerHTML="分數:"+ score;
  target.classList.add("explode");
  setTimeout(()=>{
  target.remove();
  if (time>0){
  createTarget();
  }
  },50);
});
}
  createTarget();
const countdown = setInterval(()=>{
  time--;
  document.getElementById("timer").innerHTML = time;
  if(time<=0){
  clearInterval(countdown);
  document.querySelectorAll(".target").forEach(target=>{
  target.remove();
  });
  alert("遊戲結束 \n你的分數:"+ score);
  }
},1000);
const crosshair = document.getElementById("crosshair");
document.addEventListener("mousemove",(e)=>{
  crosshair.style.left = e.clientX + "px";
  crosshair.style.top = e.clientY + "px";
});
</script>
</body>
</html>
